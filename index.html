<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOKER MUSIC STORE</title>
    <!-- Google Fonts for logo & text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <h1>JOKER <span class="highlight">MUSIC STORE</span></h1>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search for music or movies...">
        </div>
    </header>

    <!-- Trending Music Section -->
    <section id="music-section">
        <h2 class="section-title">🎵 Trending Music</h2>
        <div class="card-grid" id="musicGrid"></div>
    </section>

    <!-- Trending Movies Section -->
    <section id="movies-section">
        <h2 class="section-title">🎬 Trending Movies</h2>
        <div class="card-grid" id="moviesGrid"></div>
    </section>

    <!-- YouTube Player Modal -->
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="player"></div>
        </div>
    </div>

    <footer>
        <p>© 2025 JOKER MUSIC STORE. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
